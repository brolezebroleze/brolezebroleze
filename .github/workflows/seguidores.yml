name: Contribuidores
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: brolezebroleze
          template: classic
          base: "" 
          filename: contributors.svg
          
          # Plugin de Contribuidores
          plugin_contributors: yes
          plugin_contributors_head: ""      # Remove títulos extras
          plugin_contributors_ignored: github-actions[bot], dependabot[bot]
          plugin_contributors_contributions: yes # Mostra o número de contribuições
